# LLaMA-Factory training config — Qwen3-VL-32B + LoRA v3
# v3 changes vs v2:
#   - Enriched labels (same as v2)
#   - Single frame strategy per video (NOT 5 × same label)
#   - 30 normal-video negatives ("no anomaly visible") added
# Other hyperparameters identical to v2.
model_name_or_path: Qwen/Qwen3-VL-32B-Instruct
trust_remote_code: true
image_max_pixels: 65536

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all

dataset: rtfm_qwen_sft_v3_train
eval_dataset: rtfm_qwen_sft_v3_eval
template: qwen3_vl_nothink
cutoff_len: 5120
preprocessing_num_workers: 8
dataloader_num_workers: 2

output_dir: /scratch/svc_td_ppml/qrx527/niaz_research_v3_enriched_labels_single_strategy_with_normal_negatives/models/qwen3vl32_rtfm_lora_v3

logging_steps: 1
save_steps: 5
eval_strategy: steps
eval_steps: 5
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
